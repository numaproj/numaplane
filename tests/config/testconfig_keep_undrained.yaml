logLevel: INFO
defaultUpgradeStrategy: "progressive"
progressive:
  defaultAssessmentSchedule:
    - kind: Pipeline
      schedule: "120,360,0,10"
    - kind: MonoVertex
      schedule: "120,360,0,10"
    - kind: InterstepBufferService
      schedule: "0,480,0,10"
  analysisRunTimeout: "1200"
pipeline:
  keepUndrainedPipelines: true
  maxRecyclableDurationMinutes: 60
