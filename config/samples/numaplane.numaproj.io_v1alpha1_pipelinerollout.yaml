apiVersion: numaplane.numaproj.io/v1alpha1
kind: PipelineRollout
metadata:
  name: my-pipeline
  namespace: example-namespace
spec:
  strategy:
    progressive:
      assessmentSchedule: "60,60,10"
    analysis:
      args:
      templates:
  riders:
    - definition:
        apiVersion: v1
        kind: ConfigMap
        metadata:
          name: map-configmap
        data:
          config.json: |
            {
              "allowData": true,
              "anotherField": "something"
            }
      progressive: true
    - perVertex: true
      definition:
        apiVersion: autoscaling.k8s.io/v1beta2
        kind: VerticalPodAutoscaler
        metadata: 
          name: vpa
        spec:
          targetRef: 
            apiVersion: numaproj.io/v1alpha1
            kind: Vertex
            name: '{{.pipeline-name}}-{{.vertex-name}}'
  pipeline:
   spec:
      interStepBufferServiceName: my-isbsvc
      vertices:
        - name: in
          source:
            # A self data generating source
            generator:
              rpu: 500
              duration: 1s
        - name: cat
          scale: 
            min: 3
            max: 5
          udf:
            container:
              image: quay.io/numaio/numaflow-go/map-maybe-cat:stable
              volumeMounts:
                - name: cm-volume
                  mountPath: /etc/config
          volumes:
            - name: cm-volume
              configMap:
                name: map-configmap-{{.pipeline-name}}
        - name: out
          sink:
            # A simple log printing sink
            log: {}
      edges:
        - from: in
          to: cat
        - from: cat
          to: out
